name: Namira Batch Checker

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов
  workflow_dispatch:  # Ручной запуск

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check Binary
        run: |
          echo "🔍 Checking for binary..."
          if [ ! -f namira-batch-checker ]; then
            echo "❌ namira-batch-checker not found!"
            echo "Please build and commit the binary first"
            exit 1
          fi
          ls -lh namira-batch-checker
          file namira-batch-checker
      
      - name: Check Subscriptions
        run: |
          echo "📋 Checking subscriptions.txt..."
          if [ ! -f subscriptions.txt ]; then
            echo "⚠️  subscriptions.txt not found, creating default..."
            cat > subscriptions.txt << 'EOF'
          # Default subscriptions
          https://raw.githubusercontent.com/ALIILAPRO/v2rayNG-Config/main/sub.txt
          https://raw.githubusercontent.com/mfuu/v2ray/master/v2ray
          https://raw.githubusercontent.com/yebekhe/vpn-fail/refs/heads/main/sub-link
          EOF
          fi
          echo "Subscriptions:"
          cat subscriptions.txt | grep -v "^#" | grep -v "^$"
      
      - name: Run Namira Batch Checker
        run: |
          echo "🚀 Starting Namira Batch Checker..."
          chmod +x namira-batch-checker
          ./namira-batch-checker batch --subscriptions subscriptions.txt --concurrent 300 --timeout 15s
        timeout-minutes: 45
      
      - name: Check Results
        run: |
          echo "📊 Checking generated files..."
          ls -lh vpn*.txt bobi_vpn*.txt vpn_report.json 2>/dev/null || echo "Some files missing"
          
          if [ -f vpn.txt ]; then
            WORKING_COUNT=$(wc -l < vpn.txt)
            echo "✅ Working keys: $WORKING_COUNT"
          else
            echo "⚠️ No working keys found"
          fi
          
          if [ -d countries ]; then
            COUNTRY_COUNT=$(ls -1 countries/*.txt 2>/dev/null | wc -l)
            echo "🌍 Country files: $COUNTRY_COUNT"
          fi
      
      - name: Commit Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add all output files
          git add -f vpn.txt vpn_renamed.txt vpn_base64.txt 2>/dev/null || true
          git add -f bobi_vpn.txt vpn_report.json 2>/dev/null || true
          git add -f countries/ 2>/dev/null || true
          
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M UTC')
            WORKING_COUNT=$(wc -l < vpn.txt 2>/dev/null || echo "0")
            git commit -m "🔄 Auto-update: $WORKING_COUNT working keys [$TIMESTAMP]"
            git push
            echo "✅ Changes pushed successfully"
          fi
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vpn-check-results
          path: |
            vpn*.txt
            bobi_vpn*.txt
            vpn_report.json
            countries/
          retention-days: 7
